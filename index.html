<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>👋 thomas tu</title>
        <style>
            body {
                font-family: monospace;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                text-align: center;
            }
            a {
                color: inherit;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            a.loading {
                pointer-events: none;
                cursor: default;
            }
            .github-link {
                margin-top: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }
            .loading::after {
                content: "...";
                animation: dots 1.5s steps(3, end) infinite;
                display: inline-block;
                width: 1.5em;
            }
            @keyframes dots {
                0%,
                25% {
                    content: ".";
                }
                26%,
                50% {
                    content: "..";
                }
                51%,
                100% {
                    content: "...";
                }
            }
        </style>
    </head>
    <body>
        <div>
            <h1>i've moved!</h1>
            <div class="home-link">
                <a href="https://thomastu.dev">Find me here</a>
            </div>
        </div>
    </body>
</html>
